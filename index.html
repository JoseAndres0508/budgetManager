<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control de economía personal</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <h1>Control de economía personal</h1>

  <div id="summary">
    <div class="stat-card">
      <p>Ingresos</p>
      <p id="sum-in">₡0</p>
    </div>
    <div class="stat-card">
      <p>Gastos</p>
      <p id="sum-out">₡0</p>
    </div>
    <div class="stat-card">
      <p>Saldo</p>
      <p id="sum-bal">₡0</p>
    </div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="mov">Movimientos</button>
    <button class="tab-btn" data-tab="mens">Mensualidades</button>
    <button class="tab-btn" data-tab="pend">Pagos pendientes</button>
  </div>

  <div id="panel-mov">
    <form id="form-mov">
      <input type="text" id="mov-desc" placeholder="Descripción" required class="full" />
      <select id="mov-tipo">
        <option value="ingreso">Ingreso</option>
        <option value="gasto">Gasto</option>
      </select>
      <input type="number" id="mov-monto" placeholder="Monto" step="1" required />
      <input type="date" id="mov-fecha" class="full" />
      <button type="submit" class="full">Agregar movimiento</button>
    </form>
    <div id="list-mov"></div>
  </div>

  <div id="panel-mens" style="display:none;">
    <form id="form-mens">
      <input type="text" id="mens-desc" placeholder="Nombre (ej. Netflix, alquiler)" required class="full" />
      <input type="number" id="mens-monto" placeholder="Monto mensual" step="1" required />
      <input type="number" id="mens-dia" placeholder="Día de pago (1-31)" min="1" max="31" required />
      <button type="submit" class="full">Agregar mensualidad</button>
    </form>
    <div id="list-mens"></div>
  </div>

  <div id="panel-pend" style="display:none;">
    <form id="form-pend">
      <input type="text" id="pend-desc" placeholder="Descripción del pago" required class="full" />
      <input type="number" id="pend-monto" placeholder="Monto" step="1" required />
      <input type="date" id="pend-fecha" required />
      <button type="submit" class="full">Agregar pago pendiente</button>
    </form>
    <div id="list-pend"></div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
