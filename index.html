<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control de economía personal</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<main id="app">
  <h1>Control de economía personal</h1>

  <section aria-label="Resumen">
    <dl id="summary">
      <div class="stat-card">
        <dt>Ingresos</dt>
        <dd id="sum-in">₡0</dd>
      </div>
      <div class="stat-card">
        <dt>Gastos</dt>
        <dd id="sum-out">₡0</dd>
      </div>
      <div class="stat-card">
        <dt>Saldo</dt>
        <dd id="sum-bal">₡0</dd>
      </div>
    </dl>
  </section>

  <nav class="tabs" aria-label="Secciones">
    <button class="tab-btn active" data-tab="mov" id="tab-mov" aria-controls="panel-mov" aria-selected="true">Movimientos</button>
    <button class="tab-btn" data-tab="mens" id="tab-mens" aria-controls="panel-mens" aria-selected="false">Mensualidades</button>
    <button class="tab-btn" data-tab="pend" id="tab-pend" aria-controls="panel-pend" aria-selected="false">Pagos pendientes</button>
  </nav>

  <section id="panel-mov" aria-labelledby="tab-mov">
    <form id="form-mov">
      <label for="mov-desc" class="full">Descripción
        <input type="text" id="mov-desc" name="mov-desc" required>
      </label>
      <label for="mov-tipo">Tipo
        <select id="mov-tipo" name="mov-tipo">
          <option value="ingreso">Ingreso</option>
          <option value="gasto">Gasto</option>
        </select>
      </label>
      <label for="mov-monto">Monto
        <input type="number" id="mov-monto" name="mov-monto" step="1" required>
      </label>
      <label for="mov-fecha" class="full">Fecha
        <input type="date" id="mov-fecha" name="mov-fecha">
      </label>
      <button type="submit" class="full">Agregar movimiento</button>
    </form>
    <ul id="list-mov"></ul>
  </section>

  <section id="panel-mens" aria-labelledby="tab-mens" hidden>
    <form id="form-mens">
      <label for="mens-desc" class="full">Nombre
        <input type="text" id="mens-desc" name="mens-desc" placeholder="Netflix, alquiler" required>
      </label>
      <label for="mens-monto">Monto mensual
        <input type="number" id="mens-monto" name="mens-monto" step="1" required>
      </label>
      <label for="mens-dia">Día de pago
        <input type="number" id="mens-dia" name="mens-dia" min="1" max="31" required>
      </label>
      <button type="submit" class="full">Agregar mensualidad</button>
    </form>
    <ul id="list-mens"></ul>
  </section>

  <section id="panel-pend" aria-labelledby="tab-pend" hidden>
    <form id="form-pend">
      <label for="pend-desc" class="full">Descripción del pago
        <input type="text" id="pend-desc" name="pend-desc" required>
      </label>
      <label for="pend-monto">Monto
        <input type="number" id="pend-monto" name="pend-monto" step="1" required>
      </label>
      <label for="pend-fecha">Fecha límite
        <input type="date" id="pend-fecha" name="pend-fecha" required>
      </label>
      <button type="submit" class="full">Agregar pago pendiente</button>
    </form>
    <ul id="list-pend"></ul>
  </section>
</main>

<script src="app.js"></script>
</body>
</html>
